<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Agent Readability — Settings</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body { width: 480px; }
      .field { margin-bottom: 12px; }
      .field label { display: block; font-size: 11px; color: #6e6e73; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
      .field input { width: 100%; padding: 6px 8px; border: 1px solid #e5e5ea; border-radius: 4px; font-size: 13px; }
    </style>
  </head>
  <body>
    <header><h1>Settings</h1></header>
    <main>
      <div class="field">
        <label for="telemetry-enabled" style="text-transform: none; font-size: 13px; color: inherit;">
          <input id="telemetry-enabled" type="checkbox" style="width: auto; margin-right: 6px;" />
          Send anonymous usage data
        </label>
        <p style="font-size: 11px; color: #6e6e73; margin: 4px 0 0;">
          On by default. No URLs or page content. See
          <a href="https://a14y.dev/privacy/" target="_blank" rel="noopener">privacy policy</a>.
        </p>
      </div>
      <div class="field">
        <label for="max-pages">Max pages per crawl</label>
        <input id="max-pages" type="number" min="1" max="5000" />
      </div>
      <div class="field">
        <label for="concurrency">Concurrency</label>
        <input id="concurrency" type="number" min="1" max="32" />
      </div>
      <div class="field">
        <label for="polite-delay">Polite delay (ms)</label>
        <input id="polite-delay" type="number" min="0" max="5000" />
      </div>
      <button id="save" type="button">Save</button>
      <p id="saved-status" class="status"></p>
    </main>
    <script type="module" src="options.ts"></script>
  </body>
</html>
