<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Agent Readability — Report</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('a14y-theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body { width: 720px; max-width: 100%; }
      .report-header { display: flex; align-items: center; gap: 12px; }
      .report-header h1 { flex: 1; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th, td { padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: left; }
      th { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.04em; }
      .pass { color: var(--scope-page); }
      .fail { color: #ff3b30; }
      .warn { color: #ff9500; }
      .na { color: var(--text-muted); }
      .error { color: #ff3b30; font-weight: 600; }
      details { margin-bottom: 12px; }
      summary { cursor: pointer; font-weight: 600; padding: 6px 0; }
      .group-title { font-weight: 600; margin: 12px 0 4px; color: var(--text); }
      h2 { font-size: 16px; margin: 18px 0 8px; }
    </style>
  </head>
  <body>
    <header class="report-header">
      <h1>Agent Readability Report</h1>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
        <svg class="theme-icon icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="theme-icon icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>
    <main>
      <div id="empty" hidden>
        <p>No audits yet. Open the popup on any docs site and click <strong>Check this page</strong>.</p>
      </div>
      <div id="report" hidden>
        <div class="row">
          <span class="label">URL</span>
          <code id="report-url"></code>
        </div>
        <div class="row">
          <span class="label">Score</span>
          <strong id="report-score"></strong>
          <span id="report-meta" class="status"></span>
        </div>
        <h2>Site checks</h2>
        <table id="site-table"><tbody></tbody></table>
        <h2 id="page-section-title">Page checks</h2>
        <div id="pages-container"></div>
        <div class="export-buttons" style="margin-top: 16px; display: flex; gap: 8px;">
          <button id="export-json" type="button">Download JSON</button>
          <button id="export-markdown" type="button">Download Markdown</button>
          <button id="export-prompt" type="button">Download fix prompt</button>
        </div>
      </div>
      <h2>History</h2>
      <table id="history">
        <thead><tr><th>Score</th><th>URL</th><th>Scorecard</th><th>When</th></tr></thead>
        <tbody></tbody>
      </table>
    </main>
    <script type="module" src="results.ts"></script>
  </body>
</html>
