<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>a14y — Agent Readability</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="brand-row">
      <svg class="brand-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 422.61 309.61" width="22" height="22" aria-hidden="true" focusable="false">
        <g fill="none" stroke="currentColor" stroke-miterlimit="10" stroke-width="10">
          <line x1="150.5" y1="25.5" x2="25.5" y2="75.5"/>
          <line x1="275.5" y1="75.5" x2="150.5" y2="25.5"/>
          <line x1="275.5" y1="223" x2="275.5" y2="75.5"/>
          <line x1="150.5" y1="275.5" x2="275.5" y2="223"/>
          <line x1="25.5" y1="225.5" x2="148.08" y2="275.5"/>
          <line x1="25.5" y1="75.5" x2="25.5" y2="225.5"/>
          <line x1="275.5" y1="75.5" x2="25.5" y2="225.5"/>
          <line x1="25.5" y1="75.5" x2="275.5" y2="223"/>
          <line x1="150.5" y1="25.5" x2="150.5" y2="275.5"/>
          <line x1="25.5" y1="75.5" x2="275.5" y2="75.5"/>
          <line x1="25.5" y1="225.5" x2="275.5" y2="225.5"/>
        </g>
        <g fill="currentColor" stroke="currentColor" stroke-miterlimit="10">
          <circle cx="25.5" cy="75.5" r="25"/>
          <circle cx="150.5" cy="275.5" r="25"/>
          <circle cx="275.5" cy="225.5" r="25"/>
          <circle cx="25.5" cy="225.5" r="25"/>
          <circle cx="275.5" cy="75.5" r="25"/>
          <circle cx="150.5" cy="25.5" r="25"/>
          <circle cx="150.5" cy="150.5" r="25"/>
        </g>
        <circle cx="262.5" cy="150.5" r="112.5" fill="#fff" fill-opacity="0.9"/>
        <circle cx="262.75" cy="150.5" r="112.5" fill="none" stroke="currentColor" stroke-width="10" stroke-miterlimit="10"/>
        <line x1="375.5" y1="262.5" x2="342.48" y2="229.41" fill="none" stroke="currentColor" stroke-width="10" stroke-miterlimit="10"/>
        <line x1="356.79" y1="243.79" x2="414.48" y2="301.48" fill="none" stroke="currentColor" stroke-width="23" stroke-miterlimit="10"/>
        <g fill="none" stroke="currentColor" stroke-width="20" stroke-miterlimit="10">
          <line x1="200.5" y1="90.5" x2="325.5" y2="90.5"/>
          <line x1="200.5" y1="130.45" x2="325.5" y2="130.45"/>
          <line x1="200.5" y1="170.43" x2="325.5" y2="170.43"/>
          <line x1="200.5" y1="210.49" x2="325.5" y2="210.49"/>
        </g>
      </svg>
      <span class="brand-word">a14y</span>
      <span class="eyebrow">Agent readability</span>
    </header>

    <main>
      <div class="field">
        <span class="field-label">URL</span>
        <code id="current-url" class="url-pill">…</code>
      </div>

      <div class="field field--inline">
        <label class="field-label" for="scorecard">Scorecard</label>
        <select id="scorecard" class="select"></select>
      </div>

      <div class="actions">
        <button id="check-page" class="btn btn--primary" type="button">Check this page</button>
        <button id="check-site" class="btn btn--ghost" type="button">Scan whole site</button>
      </div>

      <progress id="progress" value="0" max="100" hidden></progress>
      <p id="status" class="status"></p>

      <section id="result" class="score-card" hidden>
        <div id="score" class="score-number"></div>
        <div id="score-meta" class="score-meta"></div>
        <a id="open-results" class="result-link" href="#">View full report →</a>
      </section>
    </main>

    <footer class="popup-footer">
      <a href="https://a14y.dev" target="_blank" rel="noopener">a14y.dev</a>
      <span aria-hidden="true">·</span>
      <a href="https://a14y.dev/privacy/" target="_blank" rel="noopener">Privacy</a>
    </footer>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
