name: E2E docs

on:
  pull_request:
    paths:
      - 'packages/apps/docs/**'
      - 'packages/core/**'
      - '.github/workflows/e2e-docs.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'packages/apps/docs/**'
      - 'packages/core/**'
      - '.github/workflows/e2e-docs.yml'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The docs app imports @a14y/core's dist at runtime (the scan engine the
      # leaderboard click-to-scan drives), so it must be built before the dev
      # server the E2E spec boots can resolve it.
      - name: Build @a14y/core
        run: npm run build --workspace @a14y/core

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/apps/docs/package.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: packages/apps/docs

      - name: Run E2E tests
        run: npm run test:e2e --workspace @a14y/docs
