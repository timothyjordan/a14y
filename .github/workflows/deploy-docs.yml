name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - 'packages/apps/docs/**'
      - 'packages/core/**'
      - '.github/workflows/deploy-docs.yml'
      - 'package.json'
      - 'package-lock.json'
  # Redeploy after every successful Release run so the
  # /chrome-extension/ page picks up newly-released asset metadata
  # (the page calls the GitHub Releases API at build time).
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight deploy at a time; newer pushes cancel older ones.
concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build:
    # Skip workflow_run firings where the upstream Release failed —
    # there's no new release metadata to pick up in that case.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # @a14y/core must be built first so the docs site can
      # import its dist at build time (scorecard manifests, type
      # definitions, etc. come from @a14y/core directly).
      - name: Build @a14y/core
        run: npm run build --workspace @a14y/core

      # The per-site OG image generator (scripts/build-site-og.ts in
      # @a14y/docs) drives a headless Chromium via Playwright. The
      # browser binary is cached separately from npm; the OG output
      # is cached per content-fingerprint of research.json + the
      # three template files, so unchanged slugs are reused across
      # runs and only changed slugs re-screenshot.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/apps/docs/package.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium
        working-directory: packages/apps/docs

      - name: Cache per-site OG screenshots
        uses: actions/cache@v4
        with:
          path: packages/apps/docs/public/leaderboard
          key: og-cache-v1-${{ hashFiles('packages/apps/docs/src/data/research.json', 'packages/apps/docs/src/lib/build-badge-html.ts', 'packages/apps/docs/src/lib/badge-style.ts', 'packages/apps/docs/src/lib/build-site-og.ts') }}
          restore-keys: |
            og-cache-v1-

      - name: Build @a14y/docs
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          # Public URL of the Cloud Run scan proxy that powers the homepage
          # "scan a page" widget. Set as a repo Variable (Settings > Secrets
          # and variables > Actions > Variables). Not secret: it ships in
          # client JS. When unset, the widget shows a "not available" state
          # instead of failing.
          PUBLIC_SCAN_PROXY_URL: ${{ vars.PUBLIC_SCAN_PROXY_URL }}
        run: npm run build --workspace @a14y/docs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
