name: Release

on:
  push:
    branches: [main]
  # Manual escape hatch for re-publishing after a fixable infra failure.
  # Pass the workspace path (e.g. `packages/core`); the publish job runs
  # for that path only and skips release-please. Don't use this for
  # routine releases — let release-please drive those.
  workflow_dispatch:
    inputs:
      path:
        description: Workspace path to republish (e.g. packages/core)
        required: true
        type: string

# release-please commits the version bumps and tags releases.
permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance attestations

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    # Skip release-please on manual dispatch — the user is bypassing the
    # normal flow to republish a previously released path.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Both files live at the repo root and are committed.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    # `always()` lets this job run even when `release-please` is skipped
    # (which happens on workflow_dispatch). Then the body of the
    # condition decides whether we actually publish.
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch') ||
        (github.event_name == 'push' &&
         needs.release-please.result == 'success' &&
         needs.release-please.outputs.releases_created == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      # One package per matrix slot. Failures publish the others independently.
      fail-fast: false
      matrix:
        path: >-
          ${{ github.event_name == 'workflow_dispatch'
              && fromJSON(format('["{0}"]', inputs.path))
              || fromJSON(needs.release-please.outputs.paths_released) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # Node 20 ships npm 10. npm Trusted Publishing requires npm 11.5.1+
      # — older CLIs sign sigstore provenance but don't use the OIDC token
      # as actual auth, so the publish PUT lands without credentials and
      # npm returns a misleading 404. Upgrade in place.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      # release-please bumps workspace package.json versions but does not
      # update the root package-lock.json, so `npm ci` would fail with a
      # lockfile-drift error on every release. `npm install` reconciles
      # the lockfile in-place; the lockfile inside the published tarball
      # is unaffected (npm pack only ships package.json + dist/ etc.).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # `npm run build --workspaces` iterates alphabetically, not in
      # topological order, so the CLI would build before @a14y/core's
      # dist/ exists and tsc would fall back to wrong type resolution.
      # Build in dependency order explicitly: core → telemetry → cli.
      # Aliases ship only bin.js, no build step. Extension and docs
      # aren't published from this workflow.
      - name: Build @a14y/core
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GA4_MP_API_SECRET: ${{ secrets.GA4_MP_API_SECRET }}
        run: npm run build --workspace @a14y/core

      - name: Build @a14y/telemetry
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GA4_MP_API_SECRET: ${{ secrets.GA4_MP_API_SECRET }}
        run: npm run build --workspace @a14y/telemetry

      - name: Build a14y CLI
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GA4_MP_API_SECRET: ${{ secrets.GA4_MP_API_SECRET }}
        run: npm run build --workspace a14y

      # Test only the package being published. Other workspaces have
      # already been verified by the per-PR test runs that produced this
      # release; re-running everything here would waste time and risk
      # cross-workspace flakiness.
      # `--workspace` only accepts workspace names in npm 11, not paths,
      # so we cd into the workspace dir instead.
      - name: Test ${{ matrix.path }}
        working-directory: ${{ matrix.path }}
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GA4_MP_API_SECRET: ${{ secrets.GA4_MP_API_SECRET }}
        run: npm test --if-present

      # Auth is via npm Trusted Publishing (OIDC). With `id-token: write`
      # granted at the workflow level and `registry-url` configured by
      # setup-node above, `npm publish --provenance` exchanges the GitHub
      # Actions OIDC token for a short-lived npm token at publish time —
      # no long-lived NPM_TOKEN secret involved. Each package needs its
      # Trusted Publisher configured once on npmjs.com pointing at this
      # repo + this workflow filename.
      - name: Publish ${{ matrix.path }} to npm with provenance
        working-directory: ${{ matrix.path }}
        env:
          # Re-export so any prepack scripts (telemetry inject, README build)
          # see the same values the build step did.
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GA4_MP_API_SECRET: ${{ secrets.GA4_MP_API_SECRET }}
        run: npm publish --provenance --access public
